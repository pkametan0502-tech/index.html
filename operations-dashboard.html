<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #e0e0e0;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        .sidebar h2 {
            font-weight: bold;
            text-align: center;
            color: #333;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: #333;
            margin: 10px 0;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .sidebar a:hover {
            background: rgba(0, 123, 255, 0.2);
        }
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 10px;
            width: calc(33% - 20px);
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            color: #007bff;
            font-weight: bold;
        }
        .card p {
            color: #555;
        }
        @media (max-width: 768px) {
            .card {
                width: calc(50% - 20px);
            }
        }
        @media (max-width: 480px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Settings</a>
        <a href="#">Reports</a>
        <a href="#">Analytics</a>
        <a href="#">Log Out</a>
    </div>
    <div class="main">
        <div class="card">
            <h3>Total Sales</h3>
            <p>$1,234.56</p>
        </div>
        <div class="card">
            <h3>New Users</h3>
            <p>123</p>
        </div>
        <div class="card">
            <h3>Revenue</h3>
            <p>$9,876.54</p>
        </div>
        <div class="card">
            <h3>Feedback</h3>
            <p>45</p>
        </div>
        <div class="card">
            <h3>Products</h3>
            <p>67</p>
        </div>
        <div class="card">
            <h3>Visitors</h3>
            <p>1,234</p>
        </div>
    </div>
</body>
</html>
