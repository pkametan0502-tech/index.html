<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button id="add-task-btn">Add Task</button>
        <div class="filters">
            <button id="all-btn">All</button>
            <button id="active-btn">Active</button>
            <button id="completed-btn">Completed</button>
        </div>
        <ul id="task-list"></ul>
        <button id="clear-completed-btn">Clear Completed Tasks</button>
        <div id="task-stats"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<style>
body {
    background: linear-gradient(#000080, #00aaff);
    font-family: Arial, sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    text-align: center;
}
#task-list {
    list-style-type: none;
    padding: 0;
}
.task {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #ccc;
}
.priority {
    border-radius: 5px;
    padding: 3px 5px;
    margin-left: 10px;
}
.high {background-color: red;}
.medium {background-color: orange;}
.low {background-color: green;}
button {
    background: #007bff;
    color: #fff;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
}
</style>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    tasks.forEach((task, index) => {
        const taskItem = document.createElement('li');
        taskItem.className = 'task';
        taskItem.innerHTML = `\n            <span>${task.text}</span>\n            <span class='priority ${task.priority}'>${task.priority}</span>\n            <button onclick='deleteTask(${index})'>Delete</button>\n            <button onclick='editTask(${index})'>Edit</button>\n            <button onclick='toggleComplete(${index})'>${task.completed ? 'Undo' : 'Complete'}</button>\n        `;
        list.appendChild(taskItem);
    });
}

function addTask() {
    const taskInput = document.getElementById('task-input');
    const taskText = taskInput.value;
    if (taskText) {
        tasks.push({ text: taskText, completed: false, priority: 'medium' });
        updateLocalStorage();
        taskInput.value = '';
        renderTasks();
    }
}

function deleteTask(index) {
    tasks.splice(index, 1);
    updateLocalStorage();
    renderTasks();
}

function editTask(index) {
    const newText = prompt('Edit Task', tasks[index].text);
    if (newText) {
        tasks[index].text = newText;
        updateLocalStorage();
        renderTasks();
    }
}

function toggleComplete(index) {
    tasks[index].completed = !tasks[index].completed;
    updateLocalStorage();
    renderTasks();
}

function updateLocalStorage() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
}

document.getElementById('add-task-btn').addEventListener('click', addTask);
renderTasks();
</script>
